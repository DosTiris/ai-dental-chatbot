<!DOCTYPE html>
<html>
<head>
  <title>AI Dental Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 24px;
      margin: 0;
    }

    #chat {
      max-width: 420px;
      margin: auto;
    }

    .msg {
      margin: 10px 0;
      padding: 10px 12px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
    }

    .bot {
      background: #374151;
      margin-right: auto;
    }

    #messages {
      min-height: 300px;
      margin-bottom: 12px;
    }

    input {
      width: 75%;
      padding: 12px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

  .chat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  
  .chat-header h2 {
    margin: 0;
    font-size: 20px;
  }
  
  .chat-header p {
    margin: 2px 0 0;
    font-size: 12px;
    color: #94a3b8;
  }
  
  .chat-header button {
    background: transparent;
    border: 1px solid #334155;
    color: #cbd5e1;
    border-radius: 999px;
    padding: 6px 10px;
    cursor: pointer;
  }
  
  .chat-input-row {
    display: flex;
    gap: 8px;
  }
  </style>
</head>
<body>
  <div id="chat">

  <div class="chat-header">
    <div>
      <h2>Mia</h2>
      <p>AI dental receptionist</p>
    </div>
    <button onclick="startOver()">Start over</button>
  </div>

  <div id="messages"></div>

  <div class="chat-input-row">
    <input id="input" placeholder="Ask something..." />
    <button onclick="sendMessage()">Send</button>
  </div>
  
</div>



  <script>
    async function sendMessage() {
      const input = document.getElementById("input");
      const message = input.value.trim();

      if (!message) return;

      const messages = document.getElementById("messages");

      messages.innerHTML += `<div class="msg user">${message}</div>`;
      input.value = "";

      try {
        const res = await fetch("https://ai-dental-chatbot.onrender.com/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: message,
            client_key: "demo_clinic_key"
          })
        });
  
        const data = await res.json();

        const reply =
          data.response ||
          data.reply ||
          data.answer ||
          data.message ||
          data.bot_response ||
          JSON.stringify(data);

        messages.innerHTML += `<div class="msg bot">${reply}</div>`;
      } catch (err) {
        console.error(err);
        messages.innerHTML += `<div class="msg bot">Error connecting</div>`;
      }
    }

    function startOver() {
      document.getElementById("messages").innerHTML = "";
      document.getElementById("input").value = "";
    }

    document.getElementById("input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
