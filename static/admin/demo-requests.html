<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Requests</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f7fb;
    margin:0;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    padding:12px;
    border:1px solid #ddd;
    text-align:left;
}

th{
    background:#1e40af;
    color:white;
}

.loading{
    padding:20px;
}
</style>
</head>
<body>

<h1>Demo Requests</h1>

<div id="loading" class="loading">
    Loading...
</div>

<table id="requestsTable" style="display:none;">
    <thead>
        <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Practice</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Interest</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>

const ADMIN_KEY = prompt("Enter Admin Key");

async function loadRequests() {

    try {

        const response = await fetch("/admin/api/demo-requests", {
            headers: {
                "x-admin-key": ADMIN_KEY
            }
        });

        if (!response.ok) {
            throw new Error("Unauthorized");
        }

        const data = await response.json();

        document.getElementById("loading").style.display = "none";
        document.getElementById("requestsTable").style.display = "table";

        const tbody = document.getElementById("tableBody");

        data.forEach(item => {

            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${item.created_at || ""}</td>
                <td>${item.name || ""}</td>
                <td>${item.practice_name || ""}</td>
                <td>${item.email || ""}</td>
                <td>${item.phone || ""}</td>
                <td>${item.interest || ""}</td>
            `;

            tbody.appendChild(row);

        });

    } catch (err) {

        document.getElementById("loading").innerHTML =
            "Failed to load demo requests.";

        console.error(err);

    }
}

loadRequests();

</script>

</body>
</html>
