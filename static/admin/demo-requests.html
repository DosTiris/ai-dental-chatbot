<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin - Demo Requests</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f8fb;
      color: #111827;
    }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: #fff;
      border-right: 1px solid #e5e7eb;
      padding: 24px 18px;
    }

    .brand {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav a {
      text-decoration: none;
      color: #374151;
      padding: 10px 12px;
      border-radius: 10px;
      display: block;
    }

    .nav a.active {
      background: #eef2ff;
      color: #1d4ed8;
      font-weight: 700;
    }

    .main {
      padding: 24px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    .subtitle {
      color: #6b7280;
      margin-top: 6px;
      margin-bottom: 22px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      margin-bottom: 20px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    label {
      font-weight: 700;
      font-size: 14px;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      background: #111827;
      color: white;
    }

    .muted {
      color: #6b7280;
      font-size: 13px;
      margin-top: 10px;
    }

    .danger {
      color: #b00020;
      font-size: 13px;
      margin-top: 10px;
    }

    .request-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .request-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    .request-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }

    .request-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .request-sub {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 5px;
      word-break: break-word;
    }

    .detail {
      font-size: 14px;
      margin-bottom: 7px;
      line-height: 1.45;
    }

    .detail b {
      color: #111827;
    }

    .notes-box {
    width: 100%;
    min-height: 80px;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    font-size: 14px;
    font-family: Arial, sans-serif;
    box-sizing: border-box;
    margin-top: 6px;
    resize: vertical;
    }

    .save-notes-btn {
    margin-top: 8px;
    background: #111827;
    color: white;
    padding: 8px 10px;
    font-size: 13px;
    }

    .badge {
      display: inline-block;
      background: #dcfce7;
      color: #166534;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .status-select {
    border: 1px solid #d1d5db;
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 10px;
    cursor: pointer;
    }

    .status-new {
    background: #dcfce7;
    color: #166534;
    }

    .status-contacted {
    background: #dbeafe;
    color: #1d4ed8;
    }

    .status-demo_scheduled {
    background: #ede9fe;
    color: #6d28d9;
    }

    .status-closed {
    background: #e5e7eb;
    color: #374151;
    }

    .status-not_interested {
    background: #fee2e2;
    color: #b91c1c;
    }

    .empty {
      color: #6b7280;
      text-align: center;
      padding: 30px;
      border: 1px dashed #d1d5db;
      border-radius: 14px;
      background: #fafafa;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid #e5e7eb;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .request-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">DentalBot Admin</div>

      <nav class="nav">
        <a href="/static/admin/dashboard.html">Dashboard</a>
        <a href="/static/admin/demo-requests.html" class="active">Demo Requests</a>
        <a href="/static/admin/faqs.html">FAQs</a>
      </nav>

      <div class="muted" style="margin-top:32px;">
        Internal dashboard for managing demo requests.
      </div>
    </aside>

    <main class="main">
      <h1>Demo Requests</h1>
      <p class="subtitle">View new demo requests from the Dos Tiris website.</p>

      <section class="card">
        <div class="controls">
          <div>
            <label>Admin Key</label>
            <input id="adminKey" type="text" placeholder="x-admin-key value" />
          </div>

          <div>
            <label>Search</label>
            <input id="searchInput" type="text" placeholder="Search name, practice, phone, email..." />
          </div>

          <div>
            <button id="loadBtn">Load Requests</button>
          </div>
        </div>

        <div id="status" class="muted">Enter admin key, then click Load Requests.</div>
      </section>

      <section id="requestList" class="request-list">
        <div class="empty">No demo requests loaded yet.</div>
      </section>
    </main>
  </div>

  <script>
    const API_BASE = "";
    let allRequests = [];

    function $(id) {
      return document.getElementById(id);
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDate(value) {
      if (!value) return "—";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;

      return d.toLocaleString([], {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function formatInterest(value) {
      const map = {
        mia: "Mia Only",
        website_mia: "Website + Mia",
        not_sure: "Not Sure Yet"
      };

      return map[value] || value || "—";
    }

    function setStatus(message, isError = false) {
      $("status").textContent = message;
      $("status").className = isError ? "danger" : "muted";
    }

    function getAdminKey() {
      return ($("adminKey").value || "").trim();
    }

    function saveAdminKey() {
      localStorage.setItem("adminKey", getAdminKey());
    }

    function loadAdminKey() {
      $("adminKey").value = localStorage.getItem("adminKey") || "";
    }

    function matchesSearch(item, query) {
      if (!query) return true;

      const haystack = [
        item.name,
        item.practice_name,
        item.email,
        item.phone,
        item.website,
        item.interest,
        item.message,
        item.status,
        item.notes_text,
        item.notes
        ].join(" ").toLowerCase();

      return haystack.includes(query.toLowerCase());
    }

    function renderRequests() {
      const list = $("requestList");
      const query = ($("searchInput").value || "").trim();

      const rows = allRequests.filter(item => matchesSearch(item, query));

      if (!rows.length) {
        list.innerHTML = `<div class="empty">No demo requests match this search.</div>`;
        return;
      }

      list.innerHTML = rows.map(item => `
      
        <div class="request-card">
          <div class="request-grid">
            <div>
              <div class="request-title">${escapeHtml(item.practice_name || "Unnamed Practice")}</div>
              <div class="request-sub">${escapeHtml(item.name || "No name provided")}</div>
              <div class="request-sub">Received: ${escapeHtml(formatDate(item.created_at))}</div>
            </div>

            <div>
              <div class="detail"><b>Phone:</b> ${escapeHtml(item.phone || "—")}</div>
              <div class="detail"><b>Email:</b> ${escapeHtml(item.email || "—")}</div>
              <div class="detail"><b>Website:</b> ${escapeHtml(item.website || "Not provided")}</div>
            </div>

            <div>
             <select class="status-select status-${escapeHtml(item.status || "new")}" data-id="${escapeHtml(item.id)}">
                <option value="new" ${(item.status || "new") === "new" ? "selected" : ""}>New</option>
                <option value="contacted" ${item.status === "contacted" ? "selected" : ""}>Contacted</option>
                <option value="demo_scheduled" ${item.status === "demo_scheduled" ? "selected" : ""}>Demo Scheduled</option>
                <option value="closed" ${item.status === "closed" ? "selected" : ""}>Closed</option>
                <option value="not_interested" ${item.status === "not_interested" ? "selected" : ""}>Not Interested</option>
            </select>
              <div class="detail"><b>Interest:</b> ${escapeHtml(formatInterest(item.interest))}</div>
              <div class="detail"><b>Message:</b> ${escapeHtml(item.message || "No message provided")}</div>
              <div class="detail"><b>Notes:</b></div>

              <div class="detail" style="background:#f9fafb; border:1px solid #e5e7eb; border-radius:10px; padding:10px; margin-bottom:8px;">
               <b>Saved Note:</b> ${escapeHtml(item.notes_text || item.notes || "No note saved yet")}
              </div>

            <textarea class="notes-box" data-id="${escapeHtml(item.id)}"></textarea>

            <button class="save-notes-btn" type="button" data-id="${escapeHtml(item.id)}">
             Save Notes
            </button>
            </div>
          </div>
        </div>
      `).join("");

      document.querySelectorAll(".notes-box").forEach(box => {
        const item = allRequests.find(r => String(r.id) === String(box.dataset.id));

      if (item) {
        item.notes_text = saved.notes || "";
        item.notes = saved.notes || "";
        }
        });
      document.querySelectorAll(".status-select").forEach(select => {
        select.addEventListener("change", async () => {
            try {
            await updateStatus(select.dataset.id, select.value);

            select.className = `status-select status-${select.value}`;

            setStatus("Status updated.");
            } catch (error) {
            setStatus("Status update failed: " + error.message, true);
            }
        });
        });

      document.querySelectorAll(".save-notes-btn").forEach(button => {
        button.addEventListener("click", async () => {
          const card = button.closest(".request-card");
          const notesBox = card.querySelector(".notes-box");
          const requestId = notesBox.dataset.id;

          try {
            const saved = await updateNotes(requestId, notesBox.value);

            const item = allRequests.find(r => String(r.id) === String(requestId));

            if (item) {
              item.notes_text = saved.notes || "";
              item.notes = saved.notes || "";
            }

            setStatus("Notes saved.");
            } catch (error) {
              setStatus("Notes save failed: " + error.message, true);
            }
        });
      });
    }

    async function updateNotes(requestId, notes) {
        const adminKey = getAdminKey();

        const response = await fetch(`/admin/demo-requests/${requestId}/notes`, {
            method: "POST",
            headers: {
            "accept": "application/json",
            "Content-Type": "application/json",
            "x-admin-key": adminKey
            },
            body: JSON.stringify({ notes })
        });

        const text = await response.text();
        let data = null;

        try {
            data = text ? JSON.parse(text) : null;
        } catch (e) {}

        if (!response.ok) {
            throw new Error(data?.detail || text || "Unable to save notes.");
        }

        return data;
        }

    async function updateStatus(requestId, status) {
        const adminKey = getAdminKey();

        const response = await fetch(`/admin/demo-requests/${requestId}/status`, {
            method: "POST",
            headers: {
            "accept": "application/json",
            "Content-Type": "application/json",
            "x-admin-key": adminKey
            },
            body: JSON.stringify({ status })
        });

        const text = await response.text();
        let data = null;

        try {
            data = text ? JSON.parse(text) : null;
        } catch (e) {}

        if (!response.ok) {
            throw new Error(data?.detail || text || "Unable to update status.");
        }

        return data;
        }

    async function loadRequests() {
      const adminKey = getAdminKey();

      if (!adminKey) {
        setStatus("Enter admin key first.", true);
        return;
      }

      try {
        saveAdminKey();
        setStatus("Loading demo requests...");

        const response = await fetch(API_BASE + "/admin/demo-requests?t=" + Date.now(), {
          method: "GET",
          cache: "no-store",
          headers: {
            "accept": "application/json",
            "Cache-Control": "no-cache",
            "x-admin-key": adminKey
          }
        });

        const text = await response.text();
        let data = null;

        try {
          data = text ? JSON.parse(text) : null;
        } catch (e) {
          data = null;
        }

        if (!response.ok) {
          throw new Error(data?.detail || text || "Failed to load demo requests.");
        }

        allRequests = data || [];

        renderRequests();
        setStatus(`Loaded ${allRequests.length} demo requests.`);
      } catch (error) {
        setStatus("Load failed: " + error.message, true);
      }
    }

    $("loadBtn").addEventListener("click", loadRequests);
    $("searchInput").addEventListener("input", renderRequests);

    loadAdminKey();
  </script>
</body>
</html>
