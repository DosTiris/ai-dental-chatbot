<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Timeless Smiles + Mia | Private Preview</title>
  <style>
    :root {
      /* Approved Mia tooth launcher, recolored to match Timeless Smiles. */
      --mia-primary: #143f49;
      --mia-secondary: #1f5963;
      --mia-accent: #22c55e;
      --mia-tooth: #ffffff;
      --mia-sparkle: #f4d46d;
      --preview-bg: #143f49;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body { overflow-x: hidden; }

    .preview-banner {
      position: sticky;
      top: 0;
      z-index: 2147483600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 14px;
      background: rgba(18, 63, 73, 0.96);
      color: #ffffff;
      font-size: 13px;
      line-height: 1.35;
      text-align: center;
      box-shadow: 0 4px 18px rgba(10, 42, 50, 0.18);
      backdrop-filter: blur(10px);
    }

    .preview-banner strong { color: #f4d46d; }

    .site-snapshot {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Approved Mia launcher: circular tooth badge + online dot. */
    .mia-launcher {
      position: fixed;
      right: max(22px, env(safe-area-inset-right));
      bottom: max(22px, env(safe-area-inset-bottom));
      z-index: 2147483640;
      display: grid;
      place-items: center;
      width: 72px;
      height: 72px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--mia-primary), var(--mia-secondary));
      color: var(--mia-tooth);
      cursor: pointer;
      box-shadow:
        0 18px 40px color-mix(in srgb, var(--mia-primary) 34%, transparent),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
      transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .mia-launcher:hover {
      transform: translateY(-2px) scale(1.025);
      box-shadow:
        0 22px 48px color-mix(in srgb, var(--mia-primary) 42%, transparent),
        inset 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    .mia-launcher:active { transform: translateY(0) scale(0.98); }

    .mia-launcher:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--mia-secondary) 72%, white);
      outline-offset: 4px;
    }

    .mia-launcher.is-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px) scale(0.94);
    }

    .mia-launcher-icon {
      position: relative;
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
    }

    .mia-launcher-icon svg {
      width: 49px;
      height: 49px;
      display: block;
      overflow: visible;
      filter: drop-shadow(0 7px 13px rgba(2, 6, 23, 0.22));
    }

    .mia-status-dot {
      position: absolute;
      right: 1px;
      bottom: 2px;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--mia-accent);
      border: 3px solid #ffffff;
      box-shadow:
        0 0 0 3px color-mix(in srgb, var(--mia-accent) 20%, transparent),
        0 0 12px color-mix(in srgb, var(--mia-accent) 70%, transparent);
      animation: miaOnlinePulse 2.4s ease-in-out infinite;
    }

    @keyframes miaOnlinePulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.92; }
    }

    .mia-window {
      position: fixed;
      right: max(20px, env(safe-area-inset-right));
      bottom: max(20px, env(safe-area-inset-bottom));
      z-index: 2147483645;
      width: min(420px, calc(100vw - 28px));
      height: min(690px, calc(100dvh - 58px));
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 22px;
      overflow: hidden;
      background: #0f172a;
      box-shadow: 0 28px 80px rgba(6, 39, 48, 0.45);
      opacity: 0;
      pointer-events: none;
      transform: translateY(18px) scale(0.975);
      transform-origin: bottom right;
      transition: opacity 220ms ease, transform 240ms cubic-bezier(.2,.8,.2,1);
    }

    .mia-window.is-open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .mia-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #0f172a;
    }

    .mia-close {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 5;
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      background: rgba(2, 6, 23, 0.68);
      color: #ffffff;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }

    .mia-close:hover { background: rgba(2, 6, 23, 0.9); }

    @media (max-width: 640px) {
      .preview-banner { min-height: 34px; font-size: 11.5px; }

      .mia-launcher {
        right: max(16px, env(safe-area-inset-right));
        bottom: max(16px, env(safe-area-inset-bottom));
        width: 68px;
        height: 68px;
      }

      .mia-launcher-icon {
        width: 55px;
        height: 55px;
      }

      .mia-launcher-icon svg {
        width: 46px;
        height: 46px;
      }

      .mia-window {
        inset: 0;
        width: 100%;
        height: 100dvh;
        max-width: none;
        max-height: none;
        border: 0;
        border-radius: 0;
        transform-origin: bottom center;
      }

      .mia-close {
        top: max(10px, env(safe-area-inset-top));
        right: max(10px, env(safe-area-inset-right));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
        animation-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="preview-banner" role="note">
    <strong>Private Mia Preview</strong>
    <span>This concept page demonstrates how Mia can appear on the Timeless Smiles website.</span>
  </div>

  <main aria-label="Timeless Smiles website preview">
    <img
      class="site-snapshot"
      src="timeless-smiles-homepage.png"
      alt="Static visual preview of the Timeless Smiles homepage"
      width="1440"
      height="3785"
    >
  </main>

  <button id="miaLauncher" class="mia-launcher" type="button" aria-label="Open Mia, AI Dental Receptionist" aria-controls="miaWindow" aria-expanded="false">
    <span class="mia-launcher-icon" aria-hidden="true">
      <svg viewBox="0 0 64 64" focusable="false">
        <path
          d="M20.4 6.6c3.4 0 5.7 1.3 7.7 2.4 1.5.8 2.8 1.5 3.9 1.5s2.4-.7 3.9-1.5c2-1.1 4.3-2.4 7.7-2.4 7.4 0 12.3 6.2 12.3 14.2 0 5.6-2.3 10.6-4.5 15.4-1.7 3.8-3.4 7.4-4 11.1-1.1 6.8-3.2 10.1-6.2 10.1-3.2 0-4.1-3.6-5.1-7.3-1-3.8-2-7.7-4.1-7.7s-3.1 3.9-4.1 7.7c-1 3.7-1.9 7.3-5.1 7.3-3 0-5.1-3.3-6.2-10.1-.6-3.7-2.3-7.3-4-11.1-2.2-4.8-4.5-9.8-4.5-15.4 0-8 4.9-14.2 12.3-14.2Z"
          fill="var(--mia-tooth)"
        />
        <path
          d="M24 18.5c3.1 2 8.3 3.6 16 0"
          fill="none"
          stroke="var(--mia-sparkle)"
          stroke-width="3.2"
          stroke-linecap="round"
        />
        <path
          d="M49 9.5l1.6 4.1 4.1 1.6-4.1 1.6L49 20.9l-1.6-4.1-4.1-1.6 4.1-1.6L49 9.5Z"
          fill="var(--mia-sparkle)"
        />
      </svg>
      <span class="mia-status-dot"></span>
    </span>
  </button>

  <section id="miaWindow" class="mia-window" aria-label="Mia chat window" aria-hidden="true">
    <button id="miaClose" class="mia-close" type="button" aria-label="Close Mia">×</button>
    <iframe
      id="miaFrame"
      class="mia-frame"
      title="Mia AI Dental Receptionist for Timeless Smiles"
      src="https://ai-dental-chatbot.onrender.com/static/chat.html?client_key=timeless_smiles_demo_key"
      loading="eager"
      allow="clipboard-write"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
  </section>

  <script>
    (() => {
      const launcher = document.getElementById("miaLauncher");
      const windowEl = document.getElementById("miaWindow");
      const closeButton = document.getElementById("miaClose");
      const clientKey = "timeless_smiles_demo_key";
      const apiBase = "https://ai-dental-chatbot.onrender.com";

      // This private preview intentionally keeps the launcher in the
      // Timeless Smiles color palette. The live client theme can later be
      // managed centrally in Supabase for the production installation.

      function openMia() {
        windowEl.classList.add("is-open");
        windowEl.setAttribute("aria-hidden", "false");
        launcher.setAttribute("aria-expanded", "true");
        launcher.classList.add("is-hidden");
        closeButton.focus({ preventScroll: true });
      }

      function closeMia() {
        windowEl.classList.remove("is-open");
        windowEl.setAttribute("aria-hidden", "true");
        launcher.setAttribute("aria-expanded", "false");
        launcher.classList.remove("is-hidden");
        launcher.focus({ preventScroll: true });
      }

      launcher.addEventListener("click", openMia);
      closeButton.addEventListener("click", closeMia);

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && windowEl.classList.contains("is-open")) {
          closeMia();
        }
      });
    })();
  </script>
</body>
</html>
