<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Private Mia Preview | Valley Stream DDS</title>
  <style>
    :root {
      --brand-primary: #3ABDDD;
      --brand-secondary: #1B6A78;
      --brand-accent: #AED41E;
      --brand-dark: #123C43;
      --panel-width: 390px;
      --panel-height: min(720px, calc(100vh - 112px));
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background-color: #eef4f5;
      background-image: url("/demo-sites/iryami-dental/iryami-side-background.png");
      background-position: center top;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: Arial, Helvetica, sans-serif;
    }

    body { overflow-x: hidden; }
    #website-stage {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background: transparent;
    }
    #site-screenshot {
      position: relative;
      z-index: 1;
      display: block;
      width: min(900px, 100%);
      height: auto;
      min-height: 0;
      margin: 0 auto;
      object-fit: contain;
      object-position: top center;
      background: white;
    }
    #live-site-fallback { display: none; position: fixed; inset: 0; background: white; z-index: 0; }
    #live-site-fallback iframe { width: 100%; height: 100%; border: 0; }
    #fallback-note {
      display: none; position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      z-index: 10; width: min(720px, calc(100% - 24px)); padding: 9px 14px;
      border-radius: 999px; background: rgba(18, 60, 67, .94); color: white;
      font-size: 12px; text-align: center; box-shadow: 0 8px 25px rgba(0,0,0,.18);
    }
    #preview-label {
      position: fixed; left: 14px; bottom: 14px; z-index: 40; padding: 7px 10px;
      border-radius: 999px; background: rgba(18, 60, 67, .88); color: white;
      font-size: 11px; letter-spacing: .02em; backdrop-filter: blur(8px); pointer-events: none;
    }
    #mia-launcher {
      position: fixed; right: 22px; bottom: 22px; z-index: 100; width: 72px; height: 72px;
      border: 4px solid #E7FAFD; border-radius: 50%; cursor: pointer; color: white;
      background: linear-gradient(145deg, var(--brand-primary), var(--brand-secondary));
      box-shadow: 0 14px 38px rgba(18,60,67,.36); display: grid; place-items: center;
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
    }
    #mia-launcher:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 18px 44px rgba(18,60,67,.44); }
    #mia-launcher:focus-visible { outline: 4px solid rgba(174,212,30,.42); outline-offset: 3px; }
    #mia-launcher svg { width: 38px; height: 38px; }
    #mia-online-dot {
      position: absolute; right: 1px; bottom: 5px; width: 17px; height: 17px;
      border-radius: 50%; border: 3px solid white; background: var(--brand-accent);
    }
    #mia-panel {
      position: fixed; right: 22px; bottom: 108px; z-index: 110;
      width: min(var(--panel-width), calc(100vw - 28px)); height: var(--panel-height);
      border-radius: 22px; overflow: hidden; background: var(--brand-dark);
      box-shadow: 0 22px 68px rgba(6,35,40,.36); border: 1px solid rgba(255,255,255,.25);
      opacity: 0; transform: translateY(18px) scale(.97); pointer-events: none;
      transition: opacity .2s ease, transform .22s cubic-bezier(.2,.8,.2,1);
    }
    #mia-panel.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    #mia-frame { width: 100%; height: 100%; border: 0; background: var(--brand-dark); }
    #mia-close {
      position: fixed; right: 16px; top: 12px; z-index: 120; display: none;
      width: 42px; height: 42px; border: 0; border-radius: 50%;
      background: rgba(18,60,67,.95); color: white; font-size: 27px;
      line-height: 1; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,.24);
    }
    @media (max-width: 640px) {
      #mia-launcher { width: 66px; height: 66px; right: 15px; bottom: 15px; }
      #mia-panel { inset: 0; width: 100vw; height: 100dvh; border: 0; border-radius: 0; }
      #mia-panel.open + #mia-close { display: block; }
      #preview-label { bottom: 8px; left: 8px; }
    }
    @media (prefers-reduced-motion: reduce) {
      #mia-launcher, #mia-panel { transition: none; }
    }
  </style>
</head>
<body>
  <main id="website-stage" aria-label="Valley Stream DDS website preview">
    <img id="site-screenshot" src="/demo-sites/iryami-dental/valley-stream-dds-homepage-center.png"
         alt="Full-page preview of the Valley Stream DDS website">
  </main>

  <div id="live-site-fallback" aria-hidden="true">
    <iframe src="https://www.valleystreamdds.com/"
            title="Valley Stream DDS live website background"
            loading="eager" referrerpolicy="no-referrer-when-downgrade"></iframe>
  </div>

  <div id="fallback-note">
    Live-site background is being used because the full-page screenshot file is not present.
  </div>
  <div id="preview-label">Private Mia preview · not affiliated until approved</div>

  <button id="mia-launcher" type="button" aria-label="Open Mia" aria-expanded="false">
    <svg viewBox="0 0 64 64" aria-hidden="true">
      <path fill="currentColor" d="M20.7 9.5c5.3-2.8 9.1.6 11.3.6s6-3.4 11.3-.6c7.7 4.1 8.6 13 5.3 20.3-2.4 5.2-4 7.8-5 15.1-.7 5.3-2.4 9.6-6.2 9.6-3.1 0-3.4-5-5.4-10.2-2 5.2-2.3 10.2-5.4 10.2-3.8 0-5.5-4.3-6.2-9.6-1-7.3-2.6-9.9-5-15.1-3.3-7.3-2.4-16.2 5.3-20.3z"/>
      <path fill="rgba(255,255,255,.34)" d="M22 14.5c3.6-1.7 6.1.7 8.2.7 1.2 0 2.3-.5 3.5-1.1-1.3 2.7-4.2 4.4-7.5 4.4-2 0-3.8-.7-5.2-1.8.2-.8.5-1.5 1-2.2z"/>
    </svg>
    <span id="mia-online-dot"></span>
  </button>

  <section id="mia-panel" aria-hidden="true">
    <iframe id="mia-frame" title="Mia virtual dental receptionist"></iframe>
  </section>
  <button id="mia-close" type="button" aria-label="Close Mia">×</button>

  <script>
    // Replace this after creating the practice-specific Supabase demo client.
    const MIA_CLIENT_KEY = "valley_stream_dds_demo_key";
    const MIA_URL = "https://ai-dental-chatbot.onrender.com/demo?client_key=" +
      encodeURIComponent(MIA_CLIENT_KEY);

    const screenshot = document.getElementById("site-screenshot");
    const fallback = document.getElementById("live-site-fallback");
    const fallbackNote = document.getElementById("fallback-note");
    const launcher = document.getElementById("mia-launcher");
    const panel = document.getElementById("mia-panel");
    const closeButton = document.getElementById("mia-close");
    const frame = document.getElementById("mia-frame");

    function useLiveWebsiteFallback() {
      screenshot.style.display = "none";
      fallback.style.display = "block";
      fallback.setAttribute("aria-hidden", "false");
      fallbackNote.style.display = "block";
      document.body.style.overflow = "hidden";
    }
    screenshot.addEventListener("error", useLiveWebsiteFallback);

    function openMia() {
      if (!frame.src) frame.src = MIA_URL;
      panel.classList.add("open");
      panel.setAttribute("aria-hidden", "false");
      launcher.setAttribute("aria-expanded", "true");
      launcher.style.opacity = window.matchMedia("(max-width: 640px)").matches ? "0" : "1";
      closeButton.style.display = window.matchMedia("(max-width: 640px)").matches ? "block" : "none";
    }
    function closeMia() {
      panel.classList.remove("open");
      panel.setAttribute("aria-hidden", "true");
      launcher.setAttribute("aria-expanded", "false");
      launcher.style.opacity = "1";
      closeButton.style.display = "none";
    }
    launcher.addEventListener("click", () => {
      panel.classList.contains("open") ? closeMia() : openMia();
    });
    closeButton.addEventListener("click", closeMia);
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeMia();
    });
  </script>
</body>
</html>
